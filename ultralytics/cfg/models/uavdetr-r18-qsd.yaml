  - [6, 1, Conv, [256, 1, 1, None, 1, 1, False]] # 12
  - [[-2, -1], 1, Concat, [1]] # 13
  - [-1, 3, RepC3, [256, 0.5]] # 14
  - [-1, 1, Conv, [128, 1, 1]] # 15 Y4
  - [-1, 1, DySample, [2, 'lp']] # 16
  - [4, 1, Focus, [128, 1]] # 17 P2 skip
  - [[-1, -2, 5], 1, Concat, [1]] # 18
  - [-1, 1, MFFF, []] # 19
  - [-1, 3, RepC3, [256, 0.5]] # 20 decoder P3 source
  - [-1, 1, FrequencyFocusedDownSampling, [256]] # 21
  - [[-1, 15], 1, Concat, [1]] # 22
  - [-1, 3, RepC3, [256, 0.5]] # 23 decoder P4
  - [-1, 1, FrequencyFocusedDownSampling, [256]] # 24
  - [[-1, 10], 1, Concat, [1]] # 25
  - [-1, 3, RepC3, [256, 0.5]] # 26 decoder P5
  - [[20, -1], 1, SemanticAlignmenCalibration, []] # 27 final decoder P3
